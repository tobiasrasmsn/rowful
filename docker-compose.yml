services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      PORT: ${BACKEND_PORT:-8080}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-25}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      DB_PATH: ${DB_PATH:-/data/rowful.db}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      PUBLIC_IPS: ${PUBLIC_IPS:-}
      CADDY_ADMIN_URL: ${CADDY_ADMIN_URL:-http://caddy:2019}
      CADDY_CONFIG_PATH: /etc/caddy/Caddyfile
      CADDY_SITES_PATH: /etc/caddy/sites
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./data:/data
      - ./caddy:/etc/caddy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      - backend
    expose:
      - "80"

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - frontend
      - backend
    environment:
      CADDY_ADMIN_ADDR: ${CADDY_ADMIN_ADDR:-0.0.0.0:2019}
      DEFAULT_SITE_ADDR: ${DEFAULT_SITE_ADDR:-:80}
      FRONTEND_UPSTREAM: frontend:80
      BACKEND_UPSTREAM: backend:8080
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy:/etc/caddy
      - ./caddy/data:/data
      - ./caddy/config:/config
