services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      PORT: ${BACKEND_PORT:-8080}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-25}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      DB_PATH: ${DB_PATH:-/data/rowful.db}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      PUBLIC_IPS: ${PUBLIC_IPS:-}
      PLATFORM: dokploy
      MANAGED_DOMAINS_ENABLED: "false"
    volumes:
      - ./data:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      - backend
    expose:
      - "80"

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - frontend
      - backend
    environment:
      CADDY_ADMIN_ADDR: ${CADDY_ADMIN_ADDR:-0.0.0.0:2019}
      DEFAULT_SITE_ADDR: ${DEFAULT_SITE_ADDR:-:80}
      FRONTEND_UPSTREAM: frontend:80
      BACKEND_UPSTREAM: backend:8080
    expose:
      - "80"
    volumes:
      - ./caddy:/etc/caddy
      - ./caddy/data:/data
      - ./caddy/config:/config
